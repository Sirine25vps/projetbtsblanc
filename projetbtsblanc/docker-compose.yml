

services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: gsb_ordonnances
      MYSQL_USER: gsb
      MYSQL_PASSWORD: gsbpass
    volumes:
      - mysql_data:/var/lib/mysql
      # Cette ligne lit ton script SQL situé juste à côté
      - ./01-init.sql:/docker-entrypoint-initdb.d/01-init.sql

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql

volumes:
  mysql_data: